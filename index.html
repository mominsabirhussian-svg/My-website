<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For My closest Friend ❤️</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(to right, #ff758c, #ff7eb3);
    color: white;
    text-align: center;
    overflow-x: hidden;
}

.container {
    margin-top: 30px;
}

h1 {
    font-size: 30px;
}

/* 📸 SLIDESHOW */
.slideshow {
    width: 240px;
    height: 240px;
    margin: 15px auto;
    border-radius: 20px;
    overflow: hidden;
}

.slideshow img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* ✨ PERFECT TEXT BOX */
#typing {
    font-size: 15px;
    margin: 15px auto;
    padding: 18px;
    max-width: 300px;
    line-height: 1.4; /* tighter spacing */
    background: rgba(255, 255, 255, 0.15);
    border-radius: 18px;
    backdrop-filter: blur(10px);
    text-align: left;
    box-shadow: 0 6px 20px rgba(0,0,0,0.2);
}

/* Cursor */
#typing::after {
    content: "|";
    animation: blink 1s infinite;
}

@keyframes blink {
    50% { opacity: 0; }
}

/* Buttons */
button {
    padding: 10px 20px;
    font-size: 15px;
    margin: 8px;
    border: none;
    border-radius: 18px;
    cursor: pointer;
}

#yes {
    background: #00ff99;
}

#no {
    background: #ff4d4d;
    position: relative;
}

.hidden {
    display: none;
}

/* 💖 HEARTS */
.hearts {
    position: fixed;
    width: 100%;
    height: 100%;
    top: 0;
    left: 0;
    pointer-events: none;
}

.heart {
    position: absolute;
    animation: float 5s linear infinite;
}

@keyframes float {
    0% { transform: translateY(100vh); opacity: 1; }
    100% { transform: translateY(-10vh); opacity: 0; }
}
</style>
</head>

<body>

<div class="container">
    <h1>❤️ Hey My Qutieee... ❤️</h1>

    <!-- 📸 SLIDESHOW -->
    <div class="slideshow">
        <img id="slide" src="1.jpeg">
    </div>

    <!-- ✍️ TYPING BOX -->
    <p id="typing"></p>

    <h3>You’ll always be my closest friend 🤍</h3>

    <button id="yes" onclick="yesClick()">ALWAYS ❤️</button>
    <button id="no" onmouseover="moveNo()">NO 😜</button>

    <div id="result" class="hidden">
        <h2>Thankyou for loving... ❤️✨</h2>
    </div>
</div>

<!-- 💖 HEARTS -->
<div class="hearts" id="hearts"></div>

<script>
// 📸 SLIDESHOW
let images = ["1.jpeg", "2.jpeg", "3.jpeg"];
let i = 0;

setInterval(() => {
    i = (i + 1) % images.length;
    document.getElementById("slide").src = images[i];
}, 2000);

// ✍️ PERFECT TYPING TEXT (NO EXTRA SPACE)
let text = `I still remember the first time I saw you in college during semester 2…
I never thought that moment would turn into such an important part of my life.
Slowly, you became more than just a classmate — you became my closest friend, someone I can trust and share everything with.
From my sight, you are my "deem light😅,sweet heart,Qutieee etc.." — the one who always brings positivity and brightness into my life, even on my worst days.
Your presence makes everything better, and the memories we’ve created together mean a lot to me.
I’m really grateful to have you as my best friend, and I just want to keep this bond strong and real forever ❤️`;

let index = 0;

function typeEffect() {
    if (index < text.length) {
        let char = text.charAt(index);

        if (char === "\n") {
            document.getElementById("typing").innerHTML += "<br>"; // ✅ fixed spacing
        } else {
            document.getElementById("typing").innerHTML += char;
        }

        index++;
        setTimeout(typeEffect, 20);
    }
}

typeEffect();

// ❤️ YES BUTTON
function yesClick() {
    document.getElementById("result").classList.remove("hidden");
}

// 😂 NO BUTTON MOVE
function moveNo() {
    let btn = document.getElementById("no");
    btn.style.position = "absolute";
    btn.style.top = Math.random() * window.innerHeight + "px";
    btn.style.left = Math.random() * window.innerWidth + "px";
}

// 💖 HEARTS
setInterval(() => {
    let heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "❤️";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = Math.random() * 18 + 12 + "px";
    document.getElementById("hearts").appendChild(heart);

    setTimeout(() => heart.remove(), 5000);
}, 500);
</script>

</body>
</html>
